services:
  traefik:
    container_name: traefik
    image: traefik:3.6.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - socket-proxy
    networks:
      t3_proxy:
        ipv4_address: ${TRAEFIK_IP}
      socket_proxy:        # to talk to socket-proxy
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - ${DOCKERDIR}/traefik/rules:/rules:ro
      - ${DOCKERDIR}/traefik/acme/acme.json:/acme.json
      - ${DOCKERDIR}/logs/traefik:/logs
    environment:
      TZ: ${TZ}
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_dns_api_token
      HTPASSWD_FILE: /run/secrets/basic_auth_credentials
      DOMAINNAME_1: ${DOMAINNAME_1}
      # CROWDSEC_BOUNCER_TRAEFIK_API_KEY is set in phase 6 once CrowdSec is running
    secrets:
      - cf_dns_api_token
      - basic_auth_credentials
    command:
      # ─── Global ───────────────────────────────────────────────────
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false

      # ─── Entry points ─────────────────────────────────────────────
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.options=tls-opts@file
      - --entrypoints.websecure.http.tls.certresolver=dns-cloudflare
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAINNAME_1}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAINNAME_1}

      # Trust forwarded headers from these IPs only (LAN — Cloudflare not used since gray cloud)
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=${LOCAL_IPS}

      # ─── API & dashboard ──────────────────────────────────────────
      - --api=true
      - --api.dashboard=true
      - --api.insecure=false   # explicit; dashboard reached via Traefik routing only

      # ─── Logging ──────────────────────────────────────────────────
      - --log=true
      - --log.filePath=/logs/traefik.log
      - --log.level=${LOG_LEVEL}
      - --accessLog=true
      - --accessLog.filePath=/logs/access.log
      - --accessLog.bufferingSize=100
      - --accessLog.filters.statusCodes=204-299,400-499,500-599

      # ─── Providers ────────────────────────────────────────────────
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=t3_proxy
      - --providers.file.directory=/rules
      - --providers.file.watch=true

      # ─── ACME / Let's Encrypt (DNS-01 via Cloudflare) ─────────────
      # Uncomment the staging line FIRST when testing — LE rate limits in production are real
      - --certificatesResolvers.dns-cloudflare.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory
      - --certificatesResolvers.dns-cloudflare.acme.email=${CLOUDFLARE_EMAIL}
      - --certificatesResolvers.dns-cloudflare.acme.storage=/acme.json
      - --certificatesResolvers.dns-cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesResolvers.dns-cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesResolvers.dns-cloudflare.acme.dnsChallenge.propagation.delayBeforeChecks=60s

      # ─── Plugins (CrowdSec bouncer) ───────────────────────────────
     # - --experimental.plugins.bouncer.modulename=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
     # - --experimental.plugins.bouncer.version=v1.4.4
    labels:
      - traefik.enable=true
      # Routes traefik.geet.dev → Traefik's own API service
      - traefik.http.routers.traefik-rtr.entrypoints=websecure
      - traefik.http.routers.traefik-rtr.rule=Host(`${TRAEFIK_SUBDOMAIN}.${DOMAINNAME_1}`)
      - traefik.http.routers.traefik-rtr.service=api@internal
      # Apply chain-authelia (will work once Authelia is up in stage D; until then dashboard is broken — by design)
      - traefik.http.routers.traefik-rtr.middlewares=chain-authelia@file
