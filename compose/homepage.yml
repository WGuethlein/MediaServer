services:
  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:v1.10.1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      default:
        ipv4_address: ${HOMEPAGE_IP}
      socket_proxy:
      t3_proxy:
    # No published port — Traefik only
    volumes:
      - ${DOCKERDIR}/appdata/homepage:/app/config
      # No /var/run/docker.sock — using socket_proxy from phase 3 instead
      # No /data/media mount — Homepage doesn't browse files
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage-rtr.entrypoints=websecure
      - traefik.http.routers.homepage-rtr.rule=Host(`${HOMEPAGE_SUBDOMAIN}.${DOMAINNAME_1}`)
      - traefik.http.routers.homepage-rtr.middlewares=chain-lan-only@file
      - traefik.http.routers.homepage-rtr.service=homepage-svc
      - traefik.http.services.homepage-svc.loadbalancer.server.port=3000
