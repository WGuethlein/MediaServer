services:
  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:4.0.15
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      default:
        ipv4_address: ${SONARR_IP}
      downloads:
      t3_proxy:
    volumes:
      - ${DOCKERDIR}/appdata/sonarr:/config
      - ${DATADIR_MEDIA}:/data/media
      - ${DATADIR_DOWNLOADS}:/data/downloads
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr-rtr.entrypoints=websecure
      - traefik.http.routers.sonarr-rtr.rule=Host(`${SONARR_SUBDOMAIN}.${DOMAINNAME_1}`)
      - traefik.http.routers.sonarr-rtr.middlewares=chain-authelia@file
      - traefik.http.routers.sonarr-rtr.service=sonarr-svc
      - traefik.http.services.sonarr-svc.loadbalancer.server.port=8989
