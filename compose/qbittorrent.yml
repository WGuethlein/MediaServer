services:
  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:5.0.4
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Share Gluetun's network namespace — all egress goes through VPN
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    # No `networks:` and no `ports:` — Gluetun publishes port 8080 → host 8081
    volumes:
      - ${DOCKERDIR}/appdata/qbittorrent:/config
      - ${DATADIR_DOWNLOADS}:/data/downloads
      # No /data/media — qBit doesn't write to media directly; *arrs handle imports
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      UMASK: ${QBIT_UMASK_SET}
      WEBUI_PORT: 8080
    # NO labels — when network_mode points at another service, Traefik discovery
    # would have to attach to gluetun and target qbit, which doesn't work cleanly.
    # WebUI is LAN-only at http://192.168.1.108:8081 per design decision.
