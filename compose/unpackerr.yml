services:
  unpackerr:
    container_name: unpackerr
    image: golift/unpackerr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      default:
        ipv4_address: ${UNPACKERR_IP}
    volumes:
      - ${DOCKERDIR}/appdata/unpackerr:/config
      - ${DATADIR_DOWNLOADS}:/data/downloads
      # No /data/media — unpackerr only reads from downloads, *arr does the import
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      UMASK: ${UNPACKERR_UMASK_SET}
      # Logging
      UN_DEBUG: "false"
      UN_LOG_FILES: 10
      UN_LOG_FILE_MB: 10
      # Behavior
      UN_INTERVAL: 2m
      UN_START_DELAY: 1m
      UN_RETRY_DELAY: 5m
      UN_MAX_RETRIES: 3
      UN_PARALLEL: 1
      UN_FILE_MODE: "0664"
      UN_DIR_MODE: "0775"
      # Sonarr
      UN_SONARR_0_URL: http://sonarr:8989
      UN_SONARR_0_API_KEY: ${SONARR_API_KEY}
      UN_SONARR_0_PATHS_0: /data/downloads/usenet/complete
      UN_SONARR_0_PROTOCOLS: usenet
      UN_SONARR_0_TIMEOUT: 10s
      UN_SONARR_0_DELETE_ORIG: "true"
      UN_SONARR_0_DELETE_DELAY: 5m
      # Radarr
      UN_RADARR_0_URL: http://radarr:7878
      UN_RADARR_0_API_KEY: ${RADARR_API_KEY}
      UN_RADARR_0_PATHS_0: /data/downloads/usenet/complete
      UN_RADARR_0_PROTOCOLS: usenet
      UN_RADARR_0_TIMEOUT: 10s
      UN_RADARR_0_DELETE_ORIG: "true"
      UN_RADARR_0_DELETE_DELAY: 5m
      # Lidarr
      UN_LIDARR_0_URL: http://lidarr:8686
      UN_LIDARR_0_API_KEY: ${LIDARR_API_KEY}
      UN_LIDARR_0_PATHS_0: /data/downloads/usenet/complete
      UN_LIDARR_0_PROTOCOLS: usenet
      UN_LIDARR_0_TIMEOUT: 10s
      UN_LIDARR_0_DELETE_ORIG: "true"
      UN_LIDARR_0_DELETE_DELAY: 5m
